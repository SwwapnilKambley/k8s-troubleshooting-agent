apiVersion: apps/v1
kind: Deployment
metadata:
  name: broken-app
  namespace: demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: broken-app
  template:
    metadata:
      labels:
        app: broken-app
    spec:
      containers:
      - name: broken-app
        image: nginx:this-tag-does-not-exist
        ports:
        - containerPort: 80