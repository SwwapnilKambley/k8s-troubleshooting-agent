apiVersion: apps/v1
kind: Deployment
metadata:
  name: crashloop-app
  namespace: demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crashloop-app
  template:
    metadata:
      labels:
        app: crashloop-app
    spec:
      containers:
      - name: crashloop-app
        image: busybox
        command: ["sh", "-c", "echo 'Starting...' && exit 1"]